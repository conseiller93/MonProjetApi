version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ExamplePass
      MYSQL_DATABASE: projetapinet
      MYSQL_USER: projetuser
      MYSQL_PASSWORD: projetpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./ProjetApiNet
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=projetapinet;User=projetuser;Password=projetpass;    
      - ConnectionStrings__MySqlConnection=Server=db;Port=3306;Database=projetapinet;User=projetuser;Password=projetpass;

volumes:
  db_data:
